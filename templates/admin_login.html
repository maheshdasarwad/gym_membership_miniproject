<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - MKC Fitness</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .login-container {
      background: var(--dark-card);
      padding: 3rem;
      border-radius: 30px;
      border: 1px solid rgba(0, 255, 136, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 10;
      animation: fadeInUp 1s ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 2.5rem;
      font-weight: 900;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--text-dim);
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      padding: 1rem 1.5rem;
      background: var(--dark-alt);
      border: 2px solid rgba(0, 255, 136, 0.2);
      border-radius: 15px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      transform: translateY(-2px);
    }

    .login-btn {
      width: 100%;
      padding: 1.2rem;
      background: var(--gradient);
      color: var(--dark);
      border: none;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .login-btn:hover::before {
      width: 400px;
      height: 400px;
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 255, 136, 0.5);
    }

    .back-link {
      text-align: center;
      margin-top: 2rem;
    }

    .back-link a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back-link a:hover {
      color: var(--primary);
    }

    .flash-messages {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      max-width: 400px;
    }

    .flash-success {
      background: var(--success);
      color: var(--dark);
      padding: 1rem 1.5rem;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      font-weight: 600;
      box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
    }

    .flash-error {
      background: var(--danger);
      color: var(--text);
      padding: 1rem 1.5rem;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .flash-info {
      background: var(--secondary);
      color: var(--dark);
      padding: 1rem 1.5rem;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>

  <div class="flash-messages">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <div class="login-container">
    <div class="login-header">
      <h1>🔐 Admin Login</h1>
      <p>Access the MKC Fitness Management System</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="back-link">
      <a href="{{ url_for('home') }}">← Back to Home</a>
    </div>
  </div>

  <script>
    // Auto-hide flash messages
    setTimeout(() => {
      const messages = document.querySelectorAll('.flash-messages > div');
      messages.forEach(msg => {
        msg.style.opacity = '0';
        setTimeout(() => msg.remove(), 300);
      });
    }, 5000);

    // Add floating particles
    function createParticle() {
      const particle = document.createElement('div');
      particle.style.position = 'fixed';
      particle.style.width = Math.random() * 4 + 2 + 'px';
      particle.style.height = particle.style.width;
      particle.style.background = 'var(--primary)';
      particle.style.borderRadius = '50%';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = '100%';
      particle.style.opacity = '0.3';
      particle.style.pointerEvents = 'none';
      particle.style.zIndex = '1';
      document.body.appendChild(particle);

      const duration = Math.random() * 3 + 3;
      const drift = (Math.random() - 0.5) * 100;

      particle.animate([
        { transform: 'translateY(0) translateX(0)', opacity: 0.3 },
        { transform: `translateY(-100vh) translateX(${drift}px)`, opacity: 0 }
      ], {
        duration: duration * 1000,
        easing: 'ease-out'
      }).onfinish = () => particle.remove();
    }

    setInterval(createParticle, 500);
  </script>
</body>
</html>
